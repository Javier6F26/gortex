name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      # Goreleaser-cross builds the linux binaries (amd64 + arm64) with CGO
      # cross-compile toolchains, creates the GitHub Release, and attaches
      # the tar.gz archives + checksums.txt.
      - name: Run GoReleaser (goreleaser-cross)
        run: |
          docker run --rm --privileged \
            -v "$PWD":/go/src/gortex \
            -w /go/src/gortex \
            -e GITHUB_TOKEN \
            ghcr.io/goreleaser/goreleaser-cross:v1.26 \
            release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
