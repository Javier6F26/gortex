version: 2

# Simplified goreleaser config for the javier6f26/gortex fork.
# Builds linux binaries only — darwin and windows are dropped from the
# original upstream config because this fork targets K8s/AWS + Docker.
#
# Docker images are built & pushed by the release.yml workflow (docker
# buildx) rather than goreleaser's built-in docker builder, so that
# multi-arch manifests (linux/amd64 + linux/arm64) are a single push.

before:
  hooks:
    - go mod tidy

builds:
  - id: main
    main: ./cmd/gortex/
    binary: gortex
    ldflags:
      - -s -w -X main.version={{.Version}} -X main.commit={{.ShortCommit}} -X main.date={{.Date}}
    env:
      - CGO_ENABLED=1
    goos:
      - linux
    goarch:
      - amd64
      - arm64
    # Per-target CC + CXX for CGO cross-compilation. goreleaser-cross
    # exposes these toolchains on PATH.
    overrides:
      - goos: linux
        goarch: amd64
        env:
          - CC=x86_64-linux-gnu-gcc
          - CXX=x86_64-linux-gnu-g++
      - goos: linux
        goarch: arm64
        env:
          - CC=aarch64-linux-gnu-gcc
          - CXX=aarch64-linux-gnu-g++

archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^ci:'
