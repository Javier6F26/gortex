services:
  postgres:
    image: pgvector/pgvector:0.8.4-pg18-trixie
    container_name: gortex-postgres
    environment:
      POSTGRES_USER: gortex
      POSTGRES_PASSWORD: gortex
      POSTGRES_DB: gortex
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gortex"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - pgdata:/var/lib/postgresql/data

  gortex:
    build:
      context: .
      args:
        VERSION: dev
        COMMIT: local
        DATE: now
    container_name: gortex
    ports:
      - "7379:7379"
    depends_on:
      postgres:
        condition: service_healthy
    command: daemon start --backend postgres --pg-dsn "postgres://gortex:gortex@postgres:5432/gortex?sslmode=disable" --http-addr :7379

volumes:
  pgdata:
